apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80

  - name: sidecar-container
    image: busybox
    command: ["sh", "-c", "while true; do echo Hello from sidecar container; sleep 5; done"]